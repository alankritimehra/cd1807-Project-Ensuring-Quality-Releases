trigger:
- main

pool: myAgentPool

variables:
  azureServiceConnectionId: 'AzureServiceConnection'
  appName: 'qualityreleaseapp'
  environmentName: 'test'

stages:
- stage: Build
  jobs:
  - job: BuildAndTest
    steps:
    - script: |
        wget -O terraform.zip https://releases.hashicorp.com/terraform/1.2.9/terraform_1.2.9_linux_amd64.zip
        unzip -o terraform.zip
        sudo mv terraform /usr/local/bin/ || true
        terraform version
      displayName: 'Install Terraform'

    - task: AzureCLI@2
      displayName: 'Terraform init validate plan'
      inputs:
        azureSubscription: '$(azureServiceConnectionId)'
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform/environments/test'
        inlineScript: |
          terraform init -reconfigure
          terraform validate
          terraform plan

    - script: |
        sudo npm install -g newman
      displayName: 'Install Newman'

    - script: |
        newman run TestSuite.Data-Validation.json -e Test.environment.json --reporters cli,junit --reporter-junit-export TEST-DataValidation.xml
      displayName: 'Run Data Validation Tests'
      continueOnError: true
      workingDirectory: '$(System.DefaultWorkingDirectory)/automatedtesting/postman'

    - script: |
        newman run TestSuite.Regression.json -e Test.environment.json --reporters cli,junit --reporter-junit-export TEST-Regression.xml
      displayName: 'Run Regression Tests'
      continueOnError: true
      workingDirectory: '$(System.DefaultWorkingDirectory)/automatedtesting/postman'

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/TEST-*.xml'
        searchFolder: '$(System.DefaultWorkingDirectory)/automatedtesting/postman'
        mergeTestResults: true
        testRunTitle: 'Postman Tests'

    - task: ArchiveFiles@2
      displayName: 'Archive UI Tests'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/automatedtesting/selenium'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId)-uitests.zip'

    - publish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId)-uitests.zip'
      artifact: drop-uitests

    - task: ArchiveFiles@2
      displayName: 'Archive FakeRestAPI'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/automatedtesting/FakeRestAPI'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId)-fakerestapi.zip'

    - publish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId)-fakerestapi.zip'
      artifact: drop-fakerestapi

    - task: ArchiveFiles@2
      displayName: 'Archive Performance Tests'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/automatedtesting/jmeter'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId)-perftests.zip'

    - publish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId)-perftests.zip'
      artifact: drop-perftests

- stage: Deploy
  dependsOn: Build
  jobs:
  - deployment: DeployFakeRestAPI
    environment: test
    pool: myAgentPool
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop-fakerestapi

          - task: AzureWebApp@1
            displayName: 'Deploy Azure Web App'
            inputs:
              azureSubscription: '$(azureServiceConnectionId)'
              appName: '$(appName)'
              appType: webApp
              package: '$(Pipeline.Workspace)/drop-fakerestapi/$(Build.BuildId)-fakerestapi.zip'

          - download: current
            artifact: drop-perftests

          - script: |
              wget -O jmeter.tgz https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.2.1.tgz
              tar -xzf jmeter.tgz
              unzip -o $(Pipeline.Workspace)/drop-perftests/$(Build.BuildId)-perftests.zip -d perftests
              find perftests -name "*.jmx"
              apache-jmeter-5.2.1/bin/jmeter -n -t $(find perftests -name "*.jmx" | head -1) -j jmeter.log -f
              cat jmeter.log
            displayName: 'Run JMeter Tests'

          - download: current
            artifact: drop-uitests

          - script: |
              sudo apt-get update
              sudo apt-get install -y python3-pip unzip chromium-browser
              pip3 install selenium
              mkdir -p selenium-tests
              unzip -o $(Pipeline.Workspace)/drop-uitests/$(Build.BuildId)-uitests.zip -d selenium-tests
              cd selenium-tests
              ls -la
              python3 test_saucedemo.py || python3 login.py
            displayName: 'Run Selenium Tests'
            continueOnError: true
